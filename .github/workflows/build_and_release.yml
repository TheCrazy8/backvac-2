name: Build & Release BackpackMod

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true          # <-- download LFS files (Assembly-CSharp.dll, etc.)

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"

      - name: Verify lib DLLs are real (not LFS pointers)
        run: |
          echo "=== lib/ contents ==="
          ls -lh lib/
          # LFS pointer files are ~130 bytes; real DLLs are much larger
          for f in lib/*.dll; do
            size=$(stat --format=%s "$f")
            if [ "$size" -lt 1000 ]; then
              echo "ERROR: $f looks like an LFS pointer ($size bytes)"
              exit 1
            fi
          done
          echo "All DLLs look good."

      - name: Restore & Build
        run: |
          dotnet restore BackpackMod.csproj
          dotnet build BackpackMod.csproj -c Release --no-restore

      - name: Verify output
        run: |
          echo "=== Build output ==="
          ls -lh bin/Release/net6.0/
          test -f bin/Release/net6.0/BackpackMod.dll

      - name: Package mod
        run: |
          mkdir -p release-staging
          cp bin/Release/net6.0/BackpackMod.dll release-staging/
          cp README.md release-staging/ 2>/dev/null || true
          cd release-staging
          zip -r ../BackpackMod.zip .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BackpackMod
          path: BackpackMod.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: BackpackMod.zip
          generate_release_notes: true
          name: "BackpackMod ${{ github.ref_name }}"
          body: |
            ## Installation
            1. Install [MelonLoader](https://melonwiki.xyz/) for Slime Rancher 2.
            2. Download `BackpackMod.zip` below.
            3. Extract `BackpackMod.dll` into your `Slime Rancher 2/Mods/` folder.
            4. Launch the game and press **B** to open your backpack!
