name: Build & Release BackpackMod

on:
  push:
    branches: [main]
    tags: ["v*"]          # push a tag like v1.0.0 to create a release
  pull_request:
    branches: [main]

permissions:
  contents: write         # needed for creating releases

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"

      - name: Restore & Build
        run: dotnet build BackpackMod.csproj -c Release --no-restore || dotnet build BackpackMod.csproj -c Release

      - name: Verify output
        run: |
          echo "=== Build output ==="
          ls -lh bin/Release/net6.0/
          test -f bin/Release/net6.0/BackpackMod.dll

      # ---- Package into a zip ----
      - name: Package mod
        run: |
          mkdir -p release-staging
          cp bin/Release/net6.0/BackpackMod.dll release-staging/
          cp README.md release-staging/ 2>/dev/null || true
          cd release-staging
          zip -r ../BackpackMod.zip .

      # ---- Upload as artifact (available on every build) ----
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BackpackMod
          path: BackpackMod.zip
          retention-days: 30

      # ---- Create a GitHub Release (only on version tags) ----
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: BackpackMod.zip
          generate_release_notes: true
          name: "BackpackMod ${{ github.ref_name }}"
          body: |
            ## Installation
            1. Install [MelonLoader](https://melonwiki.xyz/) for Slime Rancher 2.
            2. Download `BackpackMod.zip` below.
            3. Extract `BackpackMod.dll` into your `Slime Rancher 2/Mods/` folder.
            4. Launch the game and press **B** to open your backpack!
